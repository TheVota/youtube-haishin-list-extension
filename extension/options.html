<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Live List 設定</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="settings">
      <header class="settings-header">
        <div>
          <h1>YouTube Live List</h1>
          <p>ポップアップに表示する YouTube チャンネルを管理</p>
        </div>
      </header>

      <section class="editor" aria-label="配信者を追加">
        <form id="streamerForm" class="streamer-form">
          <label>
            <span>表示名</span>
            <input id="nameInput" type="text" autocomplete="off" placeholder="例: Channel Name">
          </label>
          <label>
            <span>YouTube チャンネル</span>
            <input id="urlInput" type="text" autocomplete="off" placeholder="例: https://www.youtube.com/@handle">
          </label>
          <button type="submit">追加</button>
        </form>
      </section>

      <section class="group">
        <div class="group-title">
          <h2>配信者</h2>
          <span id="streamerCount"></span>
        </div>
        <div id="streamerList" class="streamer-list"></div>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="shared.js"></script>
    <script src="options.js"></script>
  </body>
</html>
